name: Build Fusion Apple Silicon App
on: 
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install PyQt6==6.6.1 pyinstaller==6.4.0

      - name: Download and Extract FFmpeg
        run: |
          # 1. FFmpeg'i güvenilir bir statik kaynaktan indiriyoruz (Apple Silicon arm64)
          # -L (follow redirects) ve --retry ekleyerek bağlantı kopmalarını önlüyoruz
          curl -L --retry 5 https://evermeet.cx/ffmpeg/get/zip/arm64/release -o ffmpeg.zip
          
          # 2. Dosyanın inip inmediğini kontrol et
          ls -lh ffmpeg.zip
          
          # 3. Zip'ten çıkar (Bazen zip yerine 7z gelebilir, bu komut her ikisini de dener)
          unzip -o ffmpeg.zip || 7z x ffmpeg.zip
          
          # 4. Binary dosyasını ana dizine al ve yetkilendir
          chmod +x ffmpeg
          
          # 5. Dosyanın doğru yerde olduğunu teyit et
          ./ffmpeg -version

      - name: Create macOS Iconset
        run: |
          mkdir -p Fusion.iconset
          sips -z 1024 1024 icon.png --out Fusion.iconset/icon_512x512@2x.png
          sips -z 512 512 icon.png --out Fusion.iconset/icon_512x512.png
          sips -z 256 256 icon.png --out Fusion.iconset/icon_256x256.png
          iconutil -c icns Fusion.iconset

      - name: Build Fusion App
        run: |
          pyinstaller --windowed --onefile \
            --add-binary "ffmpeg:." \
            --icon "Fusion.icns" \
            --name "Fusion" \
            main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-AppleSilicon-v1.0
          path: dist/Fusion.app
