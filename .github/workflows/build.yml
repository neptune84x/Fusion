name: Build Fusion Mac (Universal)

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install PyQt6 pyinstaller

      # ── Fusion-Box'tan Universal binary'leri indir ────────────────────
      # Release'de bireysel binary değil, ZIP dosyaları var:
      #   ffmpeg-universal-macos.zip    → içinde: ffmpeg
      #   ffprobe-universal-macos.zip   → içinde: ffprobe
      #   MP4Box-universal-macos.zip    → içinde: MP4Box
      #
      # main.py get_bin() ile "mp4box" (küçük harf) arıyor →
      # ZIP'ten çıkan "MP4Box"'ı "mp4box" adıyla kopyalıyoruz.
      - name: Download Universal Multimedia Tools from Fusion-Box
        run: |
          set -euo pipefail
          mkdir -p tools

          BASE="https://github.com/neptune84x/Fusion-Box/releases/download/latest"

          echo "Downloading ffmpeg..."
          curl -fsSL "$BASE/ffmpeg-universal-macos.zip" -o /tmp/ffmpeg.zip
          unzip -oq /tmp/ffmpeg.zip -d /tmp/ffmpeg_dir
          cp /tmp/ffmpeg_dir/ffmpeg tools/ffmpeg

          echo "Downloading ffprobe..."
          curl -fsSL "$BASE/ffprobe-universal-macos.zip" -o /tmp/ffprobe.zip
          unzip -oq /tmp/ffprobe.zip -d /tmp/ffprobe_dir
          cp /tmp/ffprobe_dir/ffprobe tools/ffprobe

          echo "Downloading MP4Box..."
          curl -fsSL "$BASE/MP4Box-universal-macos.zip" -o /tmp/mp4box.zip
          unzip -oq /tmp/mp4box.zip -d /tmp/mp4box_dir
          # main.py "mp4box" (küçük harf) aradığından küçük harfle kaydediyoruz
          cp /tmp/mp4box_dir/MP4Box tools/mp4box

          chmod +x tools/ffmpeg tools/ffprobe tools/mp4box

          echo ""
          echo "=== Binary doğrulama ==="
          file tools/ffmpeg tools/ffprobe tools/mp4box
          echo "ffmpeg  archs: $(lipo -archs tools/ffmpeg)"
          echo "ffprobe archs: $(lipo -archs tools/ffprobe)"
          echo "mp4box  archs: $(lipo -archs tools/mp4box)"

      - name: Create ICNS Icon
        run: |
          mkdir -p Fusion.iconset
          if [ -f "Fusion.png" ]; then
            sips -z 1024 1024 Fusion.png --out Fusion.iconset/icon_512x512@2x.png
            sips -z 512  512  Fusion.png --out Fusion.iconset/icon_512x512.png
            sips -z 256  256  Fusion.png --out Fusion.iconset/icon_256x256.png
            sips -z 128  128  Fusion.png --out Fusion.iconset/icon_128x128.png
            sips -z 64   64   Fusion.png --out Fusion.iconset/icon_32x32@2x.png
            sips -z 32   32   Fusion.png --out Fusion.iconset/icon_32x32.png
            sips -z 16   16   Fusion.png --out Fusion.iconset/icon_16x16.png
            iconutil -c icns Fusion.iconset
          fi

      - name: Build App with PyInstaller
        run: |
          ICON_ARG=""
          [ -f "Fusion.icns" ] && ICON_ARG='--icon Fusion.icns'

          python -m PyInstaller --noconfirm --onedir --windowed \
            --contents-directory "internal" \
            --add-binary "tools/ffmpeg:internal" \
            --add-binary "tools/ffprobe:internal" \
            --add-binary "tools/mp4box:internal" \
            $ICON_ARG \
            --name "Fusion" \
            main.py

      - name: Package as ZIP
        run: |
          cd dist
          zip -y -r ../Fusion_v0.3.0_Universal.zip Fusion.app

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-App-Universal
          path: Fusion_v0.3.0_Universal.zip
