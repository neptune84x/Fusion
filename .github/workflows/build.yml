name: Build Fusion
on: 
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Dependencies
        run: pip install PyQt6==6.6.1 pyinstaller==6.4.0

      - name: Download FFmpeg 8.0.1
        run: |
          curl -L "https://ffmpeg.martin-riedl.de/download/macos/arm64/1766430132_8.0.1/ffmpeg.zip" -o ff.zip
          unzip -o ff.zip
          find . -name "ffmpeg" -type f -not -path '*/.*' -exec mv {} . \;
          chmod +x ffmpeg

      - name: Create macOS Icon
        run: |
          mkdir -p F.iconset
          sips -s format png icon.png --resampleHeightWidth 1024 1024 --out F.iconset/icon_512x512@2x.png
          sips -s format png icon.png --resampleHeightWidth 512 512 --out F.iconset/icon_512x512.png
          iconutil -c icns F.iconset

      - name: PyInstaller Build
        run: |
          # --windowed kalsın ama --onefile yerine --onedir (default) kullanıyoruz
          # Bu sayede extraction (dosya çıkarma) hatası yaşanmaz.
          pyinstaller --windowed \
            --add-binary "ffmpeg:." \
            --icon "F.icns" \
            --name "Fusion" \
            --hidden-import "pkgutil" \
            main.py

      - name: Fix Permissions and Zip
        run: |
          # Uygulama paketinin içindeki ana binary'ye izin ver
          chmod +x dist/Fusion.app/Contents/MacOS/Fusion
          # Uygulamanın yanındaki ffmpeg'e izin ver
          find dist/Fusion.app -name "ffmpeg" -exec chmod +x {} \;
          # Tüm paketi zipleyelim
          cd dist && zip -r -y ../Fusion_Silicon.zip Fusion.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-Silicon-Final
          path: Fusion_Silicon.zip
