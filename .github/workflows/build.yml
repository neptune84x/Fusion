name: Build Fusion Mac
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install PyQt6 pyinstaller

      - name: Install GPAC 2.4 via Specific Brew Formula
        run: |
          # GPAC 2.4 sürümüne ait olan Homebrew formula dosyasını doğrudan GitHub geçmişinden çekiyoruz
          # Bu yöntem 'brew install gpac' komutunun aksine tam olarak 2.4 sürümünü kurar
          brew install --formula https://raw.githubusercontent.com/Homebrew/homebrew-core/048d08c84306351833159981881775765792945a/Formula/g/gpac.rb
          
          # Bağımlılıklar için ffmpeg'i de kuralım
          brew install ffmpeg
          
          # Versiyon doğrulaması (Build loglarında 2.4 olduğunu göreceksin)
          mp4box -version

      - name: Prepare Binaries
        run: |
          mkdir -p binaries
          cp $(which ffmpeg) binaries/
          cp $(which ffprobe) binaries/
          cp $(which mp4box) binaries/
          chmod +x binaries/*

      - name: Create ICNS
        run: |
          if [ -f "Fusion.png" ]; then
            mkdir Fusion.iconset
            sips -z 1024 1024 Fusion.png --out Fusion.iconset/icon_512x512@2x.png
            sips -z 512 512 Fusion.png --out Fusion.iconset/icon_512x512.png
            iconutil -c icns Fusion.iconset
          fi

      - name: Build with PyInstaller
        run: |
          rm -rf build dist
          python -m PyInstaller --noconfirm --onedir --windowed \
            --contents-directory "internal" \
            --add-binary "binaries/ffmpeg:internal" \
            --add-binary "binaries/ffprobe:internal" \
            --add-binary "binaries/mp4box:internal" \
            --osx-bundle-identifier "com.neptune.fusion" \
            ${{ hashFiles('Fusion.icns') != '' && '--icon Fusion.icns' || '' }} \
            --name "Fusion" \
            main.py

      - name: Deep Sign (Fixing SIGSEGV)
        run: |
          # Uygulama içindeki tüm binary ve frameworkleri M3 (ARM64) mimarisine uygun şekilde imzalar
          codesign --force --deep --sign - dist/Fusion.app

      - name: Compress
        run: |
          cd dist
          # -y parametresi sembolik bağları (symlinks) korur, PyQt6 için kritiktir
          zip -y -r ../Fusion_Mac.zip Fusion.app

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-App
          path: Fusion_Mac.zip
