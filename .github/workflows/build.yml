name: Build Fusion Mac
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install PyQt6 pyinstaller

      - name: Download FFmpeg and FFprobe
        run: |
          # FFmpeg (Senin verdiğin link)
          curl -L https://ffmpeg.martin-riedl.de/download/macos/arm64/1766430132_8.0.1/ffmpeg.zip -o ffmpeg.zip
          unzip ffmpeg.zip
          # FFprobe (Senin verdiğin yeni link)
          curl -L https://ffmpeg.martin-riedl.de/download/macos/arm64/1766430132_8.0.1/ffprobe.zip -o ffprobe.zip
          unzip ffprobe.zip
          chmod +x ffmpeg ffprobe

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller --noconfirm --onefile --windowed \
            --add-binary "ffmpeg:." \
            --add-binary "ffprobe:." \
            main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Fusion-App
          path: dist/main.app
