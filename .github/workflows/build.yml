name: Build Fusion Apple Silicon App
on: 
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install PyQt6==6.6.1 pyinstaller==6.4.0

      - name: Download and Extract FFmpeg 8.0.1
        run: |
          curl -L "https://ffmpeg.martin-riedl.de/download/macos/arm64/1766430132_8.0.1/ffmpeg.zip" -o ffmpeg_bundle.zip
          unzip -o ffmpeg_bundle.zip
          find . -name "ffmpeg" -type f -not -path '*/.*' -exec mv {} . \;
          chmod +x ffmpeg
          ./ffmpeg -version

      - name: Create macOS Iconset
        run: |
          mkdir -p Fusion.iconset
          sips -z 1024 1024 icon.png --out Fusion.iconset/icon_512x512@2x.png
          sips -z 512 512 icon.png --out Fusion.iconset/icon_512x512.png
          sips -z 256 256 icon.png --out Fusion.iconset/icon_256x256.png
          iconutil -c icns Fusion.iconset

      - name: Build Fusion App
        run: |
          pyinstaller --windowed --onefile \
            --add-binary "ffmpeg:." \
            --icon "Fusion.icns" \
            --name "Fusion" \
            main.py

      - name: Zip App Bundle
        run: |
          # Sadece Contents değil, tüm .app klasörünü düzgünce zipleyelim
          cd dist
          zip -r ../Fusion_macOS_Silicon.zip Fusion.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-App-Silicon
          path: Fusion_macOS_Silicon.zip
