name: Build Fusion macOS App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install PyQt6==6.6.1 pyinstaller==6.4.0

      - name: Download FFmpeg Static Binary
        run: |
          curl -L https://evermeet.cx/ffmpeg/ffmpeg-6.1.1.zip -o ffmpeg.zip
          unzip ffmpeg.zip
          chmod +x ffmpeg

      - name: Build Fusion App with PyInstaller
        run: |
          pyinstaller --windowed --onefile \
            --add-binary "ffmpeg:." \
            --name "Fusion" \
            main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-macOS-App
          path: dist/Fusion.app
