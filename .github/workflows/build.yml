name: Build Fusion Mac
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install PyQt6 pyinstaller

      - name: Download FFmpeg and FFprobe
        run: |
          curl -L https://ffmpeg.martin-riedl.de/download/macos/arm64/1766430132_8.0.1/ffmpeg.zip -o ffmpeg.zip
          unzip -o ffmpeg.zip
          curl -L https://ffmpeg.martin-riedl.de/download/macos/arm64/1766430132_8.0.1/ffprobe.zip -o ffprobe.zip
          unzip -o ffprobe.zip
          chmod +x ffmpeg ffprobe

      - name: Create ICNS from PNG
        run: |
          # PNG dosyasını Apple ICNS formatına çeviriyoruz
          mkdir Fusion.iconset
          sips -z 1024 1024 Gemini_Generated_Image_joa64ujoa64ujoa6.png --out Fusion.iconset/icon_512x512@2x.png
          sips -z 512 512 Gemini_Generated_Image_joa64ujoa64ujoa6.png --out Fusion.iconset/icon_512x512.png
          sips -z 256 256 Gemini_Generated_Image_joa64ujoa64ujoa6.png --out Fusion.iconset/icon_256x256.png
          iconutil -c icns Fusion.iconset
          # Fusion.icns dosyası artık hazır

      - name: Build with PyInstaller
        run: |
          rm -rf build dist
          python -m PyInstaller --noconfirm --onedir --windowed \
            --contents-directory "internal" \
            --add-binary "ffmpeg:." \
            --add-binary "ffprobe:." \
            --icon "Fusion.icns" \
            --name "Fusion" \
            main.py

      - name: Compress App Bundle
        run: |
          cd dist
          zip -y -r ../Fusion_Mac.zip Fusion.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-App
          path: Fusion_Mac.zip
