name: Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install
        run: pip install PyQt6==6.6.1 pyinstaller==6.4.0

      - name: FFmpeg
        run: |
          curl -L "https://ffmpeg.martin-riedl.de/download/macos/arm64/1766430132_8.0.1/ffmpeg.zip" -o ff.zip
          unzip -o ff.zip
          find . -name "ffmpeg" -type f -exec mv {} . \;
          chmod +x ffmpeg

      - name: Icons
        run: |
          mkdir -p F.iconset
          sips -z 1024 1024 icon.png --out F.iconset/icon_512x512@2x.png
          sips -z 512 512 icon.png --out F.iconset/icon_512x512.png
          iconutil -c icns F.iconset

      - name: PyInstaller
        run: pyinstaller --windowed --onefile --add-binary "ffmpeg:." --icon "F.icns" --name "Fusion" main.py

      - name: Finalize
        run: |
          chmod +x dist/Fusion.app/Contents/MacOS/Fusion
          cd dist && zip -r ../Fusion.zip Fusion.app

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-App
          path: Fusion.zip
