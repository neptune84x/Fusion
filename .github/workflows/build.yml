name: Build Fusion Apple Silicon App
on: 
  push:
    branches: [ main, master ]
  workflow_dispatch: # Manuel çalıştırma butonunu geri getirir

jobs:
  build:
    runs-on: macos-14 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install PyQt6==6.6.1 pyinstaller==6.4.0

      - name: Download FFmpeg 8.0.1
        run: |
          # Evermeet linkini daha stabil olan sürümle güncelledim
          curl -L https://evermeet.cx/ffmpeg/get/zip/arm64/release -o ffmpeg.zip
          unzip ffmpeg.zip
          chmod +x ffmpeg

      - name: Create macOS Iconset
        run: |
          mkdir -p Fusion.iconset
          sips -z 1024 1024 icon.png --out Fusion.iconset/icon_512x512@2x.png
          sips -z 512 512 icon.png --out Fusion.iconset/icon_512x512.png
          sips -z 256 256 icon.png --out Fusion.iconset/icon_256x256.png
          iconutil -c icns Fusion.iconset

      - name: Build Fusion App
        run: |
          pyinstaller --windowed --onefile \
            --add-binary "ffmpeg:." \
            --icon "Fusion.icns" \
            --name "Fusion" \
            main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-AppleSilicon-v8.0.1
          path: dist/Fusion.app
