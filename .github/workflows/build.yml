name: Build Fusion Mac
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install PyQt6 pyinstaller

      - name: Download Multimedia Tools
        run: |
          # FFmpeg & FFprobe
          curl -L https://ffmpeg.martin-riedl.de/download/macos/arm64/1766430132_8.0.1/ffmpeg.zip -o ffmpeg.zip
          unzip -o ffmpeg.zip
          curl -L https://ffmpeg.martin-riedl.de/download/macos/arm64/1766430132_8.0.1/ffprobe.zip -o ffprobe.zip
          unzip -o ffprobe.zip
          
          # GitHub API kullanarak GPAC 2.4.0 sürümünün doğru macOS linkini dinamik olarak buluyoruz
          cat << 'EOF' > get_gpac.py
import urllib.request, json
try:
    req = urllib.request.urlopen("https://api.github.com/repos/gpac/gpac/releases/tags/v2.4.0")
    assets = json.loads(req.read().decode("utf-8")).get("assets", [])
    for a in assets:
        if "macOS" in a["name"] and a["name"].endswith(".pkg"):
            print(a["browser_download_url"])
            break
except:
    pass
EOF
          GPAC_URL=$(python3 get_gpac.py)
          
          if [ -z "$GPAC_URL" ]; then
            echo "GPAC 2.4.0 paketi bulunamadı!"
            exit 1
          fi
          
          echo "İndiriliyor: $GPAC_URL"
          curl -L -o gpac.pkg "$GPAC_URL"
          
          sudo installer -pkg gpac.pkg -target /
          cp /Applications/GPAC.app/Contents/MacOS/MP4Box ./mp4box
          chmod +x ffmpeg ffprobe mp4box

      - name: Create ICNS
        run: |
          mkdir Fusion.iconset
          sips -z 1024 1024 Fusion.png --out Fusion.iconset/icon_512x512@2x.png
          sips -z 512 512 Fusion.png --out Fusion.iconset/icon_512x512.png
          sips -z 256 256 Fusion.png --out Fusion.iconset/icon_256x256.png
          iconutil -c icns Fusion.iconset

      - name: Build with PyInstaller
        run: |
          rm -rf build dist
          python -m PyInstaller --noconfirm --onedir --windowed \
            --contents-directory "internal" \
            --add-binary "ffmpeg:internal" \
            --add-binary "ffprobe:internal" \
            --add-binary "mp4box:internal" \
            --icon "Fusion.icns" \
            --name "Fusion" \
            main.py

      - name: Compress
        run: |
          cd dist
          zip -y -r ../Fusion_Mac.zip Fusion.app

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-App
          path: Fusion_Mac.zip
