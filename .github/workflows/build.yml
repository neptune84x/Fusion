name: Build Fusion Mac
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install PyQt6 pyinstaller

      - name: Download Multimedia Tools
        run: |
          # 1. FFmpeg & FFprobe (ARM64)
          curl -L "https://ffmpeg.martin-riedl.de/download/macos/arm64/1766430132_8.0.1/ffmpeg.zip" -o ffmpeg.zip
          unzip -o ffmpeg.zip
          curl -L "https://ffmpeg.martin-riedl.de/download/macos/arm64/1766430132_8.0.1/ffprobe.zip" -o ffprobe.zip
          unzip -o ffprobe.zip
          
          # 2. GPAC / MP4Box ve Bağımlılıkları (OpenSSL dahil)
          curl -L "https://www.videohelp.com/download/gpac-2.4-rev0-g5d70253a-master.pkg?r=sNFQLSQXxnlh" -o gpac.pkg
          pkgutil --expand-full gpac.pkg gpac_extracted
          
          # Binary ve dylib'leri ayıkla
          mkdir -p ./lib
          find gpac_extracted -iname "mp4box" -exec cp {} ./mp4box \;
          find gpac_extracted -name "*.dylib" -exec cp {} ./lib/ \;
          
          # Çalıştırma izinlerini ver
          chmod +x ffmpeg ffprobe mp4box ./lib/*.dylib
          
          # GitHub Runner üzerinde MP4Box'ın çalışıp çalışmadığını test et
          ./mp4box -version

      - name: Create ICNS
        run: |
          if [ -f "Fusion.png" ]; then
            mkdir Fusion.iconset
            sips -z 1024 1024 Fusion.png --out Fusion.iconset/icon_512x512@2x.png
            sips -z 512 512 Fusion.png --out Fusion.iconset/icon_512x512.png
            sips -z 256 256 Fusion.png --out Fusion.iconset/icon_256x256.png
            iconutil -c icns Fusion.iconset
          fi

      - name: Build with PyInstaller
        run: |
          rm -rf build dist
          python -m PyInstaller --noconfirm --onedir --windowed \
            --contents-directory "internal" \
            --add-binary "ffmpeg:internal" \
            --add-binary "ffprobe:internal" \
            --add-binary "mp4box:internal" \
            --add-binary "lib/*.dylib:internal/lib" \
            ${{ hashFiles('Fusion.icns') != '' && '--icon Fusion.icns' || '' }} \
            --name "Fusion" \
            main-2.py

      - name: Ad-Hoc Sign (Apple Silicon Fix)
        run: |
          # Uygulama paketini derinlemesine imzalar, M3 çiplerde çökmeyi engeller
          codesign --force --deep --sign - dist/Fusion.app

      - name: Package App as ZIP
        run: |
          # Dosya izinlerini ve paket yapısını korumak için ZIP şarttır
          cd dist
          zip -r ../Fusion-Mac-ARM.zip Fusion.app
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-App-Package
          path: Fusion-Mac-ARM.zip
