name: Build macOS App
on: [push, workflow_dispatch] # Hem push yapınca hem de manuel çalışır

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Download FFmpeg Static Binary
        run: |
          # macOS için static FFmpeg indiriyoruz
          curl -L https://evermeet.cx/ffmpeg/ffmpeg-6.1.1.zip -o ffmpeg.zip
          unzip ffmpeg.zip
          chmod +x ffmpeg

      - name: Build App with PyInstaller
        run: |
          # FFmpeg'i uygulamanın içine gömüyoruz
          pyinstaller --windowed --onefile \
            --add-binary "ffmpeg:." \
            --name "VideoCleaner" \
            main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoCleaner-macOS
          path: dist/VideoCleaner.app
