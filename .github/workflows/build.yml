name: Build Fusion Mac (Universal)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install PyQt6 pyinstaller

      - name: Download Universal Multimedia Tools from Fusion-Box
        run: |
          # Fusion-Box release sayfasından senin ürettiğin Universal dosyaları çekiyoruz
          mkdir -p tools
          curl -L https://github.com/neptune84x/Fusion-Box/releases/download/latest/ffmpeg -o tools/ffmpeg
          curl -L https://github.com/neptune84x/Fusion-Box/releases/download/latest/ffprobe -o tools/ffprobe
          curl -L https://github.com/neptune84x/Fusion-Box/releases/download/latest/mp4box -o tools/mp4box
          
          # Çalıştırma izinlerini veriyoruz
          chmod +x tools/ffmpeg tools/ffprobe tools/mp4box
          
          # Mimarileri doğrula (Loglarda görmek için)
          file tools/ffmpeg
          file tools/mp4box

      - name: Create ICNS Icon
        run: |
          mkdir -p Fusion.iconset
          # Eğer Fusion.png dosyan varsa icon setini oluşturur
          if [ -f "Fusion.png" ]; then
            sips -z 1024 1024 Fusion.png --out Fusion.iconset/icon_512x512@2x.png
            sips -z 512 512 Fusion.png --out Fusion.iconset/icon_512x512.png
            iconutil -c icns Fusion.iconset
          fi

      - name: Build App with PyInstaller
        run: |
          # PyInstaller ile Universal araçları uygulamanın içine gömüyoruz
          python -m PyInstaller --noconfirm --onedir --windowed \
            --contents-directory "internal" \
            --add-binary "tools/ffmpeg:internal" \
            --add-binary "tools/ffprobe:internal" \
            --add-binary "tools/mp4box:internal" \
            --icon "Fusion.icns" \
            --name "Fusion" \
            main.py

      - name: Create DMG (Optional but better for Mac)
        run: |
          cd dist
          zip -y -r ../Fusion_v0.2.0_Universal.zip Fusion.app

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-App-Universal
          path: Fusion_v0.2.0_Universal.zip
