name: Build Fusion Mac
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install PyQt6 pyinstaller

      - name: Install GPAC 2.4 via Local Formula
        run: |
          # 1. GPAC 2.4 sürümüne ait formula dosyasını indir
          curl -L https://raw.githubusercontent.com/Homebrew/homebrew-core/048d08c84306351833159981881775765792945a/Formula/g/gpac.rb -o gpac_24.rb
          
          # 2. Bağımlılıkları önceden kur (Yükleme hızını artırır ve hataları önler)
          brew install ffmpeg libxml2 openssl@3
          
          # 3. Yerel dosya üzerinden tam olarak 2.4 sürümünü yükle
          brew install --formula ./gpac_24.rb
          
          # Versiyon kontrolü
          mp4box -version

      - name: Prepare Binaries
        run: |
          mkdir -p binaries
          # Brew ile kurulan gerçek yolları kopyala
          cp $(which ffmpeg) binaries/
          cp $(which ffprobe) binaries/
          cp $(which mp4box) binaries/
          chmod +x binaries/*

      - name: Create ICNS
        run: |
          if [ -f "Fusion.png" ]; then
            mkdir Fusion.iconset
            sips -z 1024 1024 Fusion.png --out Fusion.iconset/icon_512x512@2x.png
            sips -z 512 512 Fusion.png --out Fusion.iconset/icon_512x512.png
            sips -z 256 256 Fusion.png --out Fusion.iconset/icon_256x256.png
            iconutil -c icns Fusion.iconset
          fi

      - name: Build with PyInstaller
        run: |
          rm -rf build dist
          python -m PyInstaller --noconfirm --onedir --windowed \
            --contents-directory "internal" \
            --add-binary "binaries/ffmpeg:internal" \
            --add-binary "binaries/ffprobe:internal" \
            --add-binary "binaries/mp4box:internal" \
            --osx-bundle-identifier "com.neptune.fusion" \
            ${{ hashFiles('Fusion.icns') != '' && '--icon Fusion.icns' || '' }} \
            --name "Fusion" \
            main.py

      - name: Deep Sign for M3 Architecture
        run: |
          # Önce iç dizini (internal) sonra ana paketi imzalar. 
          # Bu adım SIGSEGV hatalarını önlemek için kritiktir.
          codesign --force --deep --sign - dist/Fusion.app

      - name: Compress
        run: |
          cd dist
          # -y flag'i symlink yapılarını korur, uygulama bütünlüğü için şarttır.
          zip -y -r ../Fusion_Mac.zip Fusion.app

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-App
          path: Fusion_Mac.zip
