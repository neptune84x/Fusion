name: Build Fusion Mac
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install PyQt6 pyinstaller

      - name: Download FFmpeg and FFprobe
        run: |
          # FFmpeg indir
          curl -L https://ffmpeg.martin-riedl.de/download/macos/arm64/1766430132_8.0.1/ffmpeg.zip -o ffmpeg.zip
          unzip ffmpeg.zip
          # FFprobe indir
          curl -L https://ffmpeg.martin-riedl.de/download/macos/arm64/1766430132_8.0.1/ffprobe.zip -o ffprobe.zip
          unzip ffprobe.zip
          chmod +x ffmpeg ffprobe

      - name: Build with PyInstaller
        run: |
          # --windowed parametresi macOS'ta .app bundle'ı oluşturur
          # Binary'leri gömüyoruz
          python -m PyInstaller --noconfirm --onefile --windowed \
            --add-binary "ffmpeg:." \
            --add-binary "ffprobe:." \
            --name "Fusion" \
            main.py

      - name: Compress App Bundle
        run: |
          # .app klasörünü Mac'in anlayacağı şekilde ve dosya izinlerini bozmadan zipleyelim
          cd dist
          zip -r ../Fusion_Mac.zip Fusion.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # KRİTİK: v4 sürümü zorunlu
        with:
          name: Fusion-Final-Package
          # Doğrudan zip dosyasını yüklüyoruz.
          path: Fusion_Mac.zip          # .app klasörünü Mac'in anlayacağı şekilde zipleyelim
          cd dist
          zip -r ../Fusion_Mac.zip Fusion.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-Final-Package
          # Artık doğrudan zip dosyasını yüklüyoruz
          path: Fusion_Mac.zip
