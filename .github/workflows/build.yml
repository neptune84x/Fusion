name: Build Fusion Mac
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: pip install PyQt6 pyinstaller

      - name: Install GPAC 2.4 (MP4Box Optimized)
        run: |
          # 1. Sadece gerekli temel bağımlılıkları kur
          brew install libxml2 openssl@3 pkg-config ffmpeg
          
          # 2. Yerel tap oluştur
          brew tap-new local/gpac
          TAP_PATH=$(brew --repository local/gpac)
          mkdir -p "$TAP_PATH/Formula"

          # 3. GPAC Formülünü FFmpeg kütüphane bağımlılığını kapatacak şekilde güncelle
          cat <<EOF > "$TAP_PATH/Formula/gpac.rb"
          class Gpac < Formula
            desc "Multimedia framework - MP4Box focus"
            homepage "https://gpac.wp.imt.fr/"
            url "https://github.com/gpac/gpac/archive/refs/tags/v2.4.0.tar.gz"
            sha256 "99c8c994d5364b963d18eff24af2576b38d38b3460df27d451248982ea16157a"
            license "LGPL-2.1-or-later"

            depends_on "pkg-config" => :build
            depends_on "libxml2"
            depends_on "openssl@3"

            def install
              # FFmpeg ve diğer uyumsuz filtreleri kapatıyoruz. 
              # Bu sayede MP4Box sorunsuz derlenir.
              args = %W[
                --prefix=#{prefix}
                --disable-ffmpeg
                --disable-alsa
                --disable-jack
                --disable-oss-audio
                --disable-x11
              ]
              system "./configure", *args
              system "make"
              system "make", "install"
            end
          end
          EOF

          # 4. Kurulumu yap
          brew install local/gpac/gpac
          mp4box -version

      - name: Prepare Binaries
        run: |
          mkdir -p binaries
          cp $(which ffmpeg) binaries/
          cp $(which ffprobe) binaries/
          cp $(which mp4box) binaries/
          chmod +x binaries/*

      - name: Build with PyInstaller
        run: |
          rm -rf build dist
          python -m PyInstaller --noconfirm --onedir --windowed \
            --contents-directory "internal" \
            --add-binary "binaries/ffmpeg:internal" \
            --add-binary "binaries/ffprobe:internal" \
            --add-binary "binaries/mp4box:internal" \
            --osx-bundle-identifier "com.neptune.fusion" \
            --name "Fusion" \
            main.py

      - name: Deep Sign
        run: |
          codesign --force --deep --sign - dist/Fusion.app

      - name: Compress
        run: |
          cd dist
          zip -y -r ../Fusion_Mac.zip Fusion.app

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-App
          path: Fusion_Mac.zip
