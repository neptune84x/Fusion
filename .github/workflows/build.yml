name: Build Fusion Mac
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install PyQt6 pyinstaller

      - name: Download Multimedia Tools
        run: |
          # FFmpeg & FFprobe indirme
          curl -L https://ffmpeg.martin-riedl.de/download/macos/arm64/1766430132_8.0.1/ffmpeg.zip -o ffmpeg.zip
          unzip -o ffmpeg.zip
          curl -L https://ffmpeg.martin-riedl.de/download/macos/arm64/1766430132_8.0.1/ffprobe.zip -o ffprobe.zip
          unzip -o ffprobe.zip
          
          # MP4Box (GPAC 2.4.0) - Kesin Sürüm Sabitleme
          # GitHub'ın yönlendirmelerini (L) ve hata durumlarını (f) yöneterek indiriyoruz
          URL="https://github.com/gpac/gpac/releases/download/v2.4.0/gpac-2.4.0-rev0-g5d96cb8b-master-macOS-aarch64.pkg"
          echo "Downloading GPAC 2.4.0 from: $URL"
          
          curl -L -f "$URL" -o gpac.pkg
          
          # İndirme başarılı mı kontrolü (9 byte hatasını önlemek için)
          FILESIZE=$(stat -f%z "gpac.pkg")
          if [ $FILESIZE -lt 1000 ]; then
            echo "Hata: Paket düzgün indirilemedi, dosya boyutu çok küçük!"
            exit 1
          fi

          sudo installer -pkg gpac.pkg -target /
          
          # Binary dosyasını çalışma dizinine alıyoruz
          cp /Applications/GPAC.app/Contents/MacOS/MP4Box ./mp4box
          
          chmod +x ffmpeg ffprobe mp4box

      - name: Create ICNS
        run: |
          mkdir Fusion.iconset
          sips -z 1024 1024 Fusion.png --out Fusion.iconset/icon_512x512@2x.png
          sips -z 512 512 Fusion.png --out Fusion.iconset/icon_512x512.png
          sips -z 256 256 Fusion.png --out Fusion.iconset/icon_256x256.png
          iconutil -c icns Fusion.iconset

      - name: Build with PyInstaller
        run: |
          rm -rf build dist
          python -m PyInstaller --noconfirm --onedir --windowed \
            --contents-directory "internal" \
            --add-binary "ffmpeg:internal" \
            --add-binary "ffprobe:internal" \
            --add-binary "mp4box:internal" \
            --icon "Fusion.icns" \
            --name "Fusion" \
            main.py

      - name: Compress
        run: |
          cd dist
          zip -y -r ../Fusion_Mac.zip Fusion.app

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-App
          path: Fusion_Mac.zip
