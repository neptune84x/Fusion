name: Build Fusion Mac
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install PyQt6 pyinstaller

      - name: Download Multimedia Tools
        run: |
          # FFmpeg & FFprobe
          curl -L https://ffmpeg.martin-riedl.de/download/macos/arm64/1766430132_8.0.1/ffmpeg.zip -o ffmpeg.zip
          unzip -o ffmpeg.zip
          curl -L https://ffmpeg.martin-riedl.de/download/macos/arm64/1766430132_8.0.1/ffprobe.zip -o ffprobe.zip
          unzip -o ffprobe.zip
          
          # MP4Box (GPAC 2.4.0) - Apple uyumluluğu ve sarma sorunları için eski stabil sürüme dönüyoruz
          ASSET_URL=$(curl -s https://api.github.com/repos/gpac/gpac/releases/tags/v2.4.0 | grep browser_download_url | grep -i "mac" | grep -i "\.pkg" | cut -d '"' -f 4 | head -n 1)
          if [ -z "$ASSET_URL" ]; then
            ASSET_URL="https://github.com/gpac/gpac/releases/download/v2.4.0/gpac-2.4.0-rev0-g5d96cb8b-master-macOS.pkg"
          fi
          curl -L "$ASSET_URL" -o gpac.pkg
          sudo installer -pkg gpac.pkg -target /
          cp /Applications/GPAC.app/Contents/MacOS/MP4Box .
          
          chmod +x ffmpeg ffprobe MP4Box
          mv MP4Box mp4box

      - name: Create ICNS
        run: |
          mkdir Fusion.iconset
          sips -z 1024 1024 Fusion.png --out Fusion.iconset/icon_512x512@2x.png
          sips -z 512 512 Fusion.png --out Fusion.iconset/icon_512x512.png
          sips -z 256 256 Fusion.png --out Fusion.iconset/icon_256x256.png
          iconutil -c icns Fusion.iconset

      - name: Build with PyInstaller
        run: |
          rm -rf build dist
          python -m PyInstaller --noconfirm --onedir --windowed \
            --contents-directory "internal" \
            --add-binary "ffmpeg:internal" \
            --add-binary "ffprobe:internal" \
            --add-binary "mp4box:internal" \
            --icon "Fusion.icns" \
            --name "Fusion" \
            main.py

      - name: Compress
        run: |
          cd dist
          zip -y -r ../Fusion_Mac.zip Fusion.app

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fusion-App
          path: Fusion_Mac.zip
